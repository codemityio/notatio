name: Check

on:
  pull_request:
    branches:
      - main
  push:
    tags:
      - 'v*'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Add Go bin to PATH
        run: echo "${HOME}/go/bin" >> ${GITHUB_PATH}

      - name: Code
        run: make cmd COMMAND="make check"

      - name: Docs
        run: make prep docs diff
